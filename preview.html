<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>朗迹 · 场景预览</title>
<link rel="stylesheet" href="css/app.css">
<style>
/* 报价面板 */
.price-panel { position: fixed; top: 50px; right: 8px; width: 220px; background: rgba(19,19,42,0.95); border: 1px solid #333; border-radius: 10px; padding: 12px; z-index: 50; font-size: 12px; max-height: calc(100vh - 120px); overflow-y: auto; }
.price-panel h4 { font-size: 12px; color: #888; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
.price-panel .empty-msg { color: #555; font-size: 11px; text-align: center; padding: 12px 0; }
.price-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #1a1a2e; font-size: 11px; }
.price-item .pname { flex: 1; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.price-item .pqty { color: #888; margin: 0 4px; font-size: 10px; }
.price-item .pprice { color: #fbbf24; white-space: nowrap; }
.price-divider { border-top: 1px solid #333; margin: 8px 0; }
.price-total { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; }
.price-total .label { color: #888; }
.price-total .val { color: #34d399; }
.price-original { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-bottom: 2px; }
.price-original .val { text-decoration: line-through; }
.discount-row { display: flex; align-items: center; gap: 6px; margin: 8px 0; }
.discount-row input { width: 60px; padding: 4px 6px; background: #0a0a14; border: 1px solid #333; border-radius: 4px; color: #fbbf24; font-size: 12px; text-align: center; }
.discount-row input:focus { outline: none; border-color: #7c3aed; }
.discount-row .label { color: #888; font-size: 11px; }
.price-panel .panel-toggle { position: absolute; top: 6px; right: 6px; font-size: 10px; color: #555; cursor: pointer; background: none; border: none; }

/* LOGO in topbar */
.topbar-logo { width: 28px; height: 28px; border-radius: 4px; object-fit: contain; margin-right: 6px; }
.topbar-logo-placeholder { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 6px; }

/* 移动端报价面板收起到右下角 */
@media (max-width: 640px) {
  .price-panel { width: 180px; right: 4px; top: 44px; font-size: 11px; padding: 8px; }
  .price-panel h4 { font-size: 11px; }
  .price-item { font-size: 10px; }
}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title">
    <span id="logoArea"></span>
    <span id="factoryLabel">场景预览</span>
  </span>
  <span>
    <a href="dashboard.html" class="btn btn-secondary" style="padding:4px 12px;font-size:11px;text-decoration:none;">← 返回管理</a>
    <span class="topbar-badge" id="productCount" style="margin-left:8px;">0</span>
  </span>
</div>

<div class="scene-wrapper" id="sceneWrapper">
  <div class="scene-area" id="sceneArea" data-scene="playground">
    <div class="scene-hint" id="sceneHint">点下方产品添加到场景 · 拖动摆放 · 滚轮缩放 · Shift+滚轮旋转</div>
  </div>
</div>

<!-- 报价面板 -->
<div class="price-panel" id="pricePanel">
  <h4>💰 方案报价 <span id="priceItemCount" style="font-size:10px;color:#555;">(0)</span></h4>
  <div id="priceList"><div class="empty-msg">拖入产品后自动计算</div></div>
  <div id="priceSummary" style="display:none;">
    <div class="price-divider"></div>
    <div class="price-original" id="priceOriginalRow">
      <span class="label">原价合计</span><span class="val" id="priceOriginal">¥0</span>
    </div>
    <div class="discount-row">
      <span class="label">折扣</span>
      <input type="number" id="discountInput" value="10" min="1" max="10" step="0.1" onchange="updatePricing()">
      <span class="label">折</span>
    </div>
    <div class="price-total">
      <span class="label">折后合计</span><span class="val" id="priceFinal">¥0</span>
    </div>
  </div>
</div>

<div class="controls">
  <div class="chip-row" id="sceneChips"><span class="chip-label">场景</span></div>
  <div class="chip-row product-chips" id="productChips"><span class="chip-label">产品</span></div>
  <div class="action-bar">
    <button class="btn btn-danger" onclick="SceneEngine.deleteSelected()">删除</button>
    <button class="btn btn-secondary" onclick="SceneEngine.clearAll()">清空</button>
    <button class="btn btn-success" onclick="SceneEngine.exportScreenshot()">截图</button>
  </div>
</div>

<input type="file" id="sceneUpload" accept="image/*" onchange="SceneEngine.handleUpload(event)">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="js/scene.js"></script>
<script src="js/pseudo3d.js"></script>
<script src="js/effects.js"></script>
<script>
var SCENES = [
  { id: 'playground', name: '游乐园', icon: '', image: 'scenes/playground.jpg' },
  { id: 'school',     name: '学校',   icon: '', image: 'scenes/school.jpg' },
  { id: 'beach',      name: '沙滩',   icon: '', image: 'scenes/beach.jpg' },
  { id: 'mall',       name: '商场',   icon: '', image: 'scenes/mall.jpg' },
  { id: 'community',  name: '小区',   icon: '', image: 'scenes/community.jpg' },
  { id: 'park',       name: '公园',   icon: '', image: 'scenes/park.jpg' },
];

var API = '/api/products';
var SETTINGS_API = '/api/settings';
var factorySettings = { logo: '', factoryName: '', discount: 10 };

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
var productMeta = {}; // { productId: { name, price, category } }

// ===== 加载工厂设置 =====
async function loadSettings() {
  try {
    var resp = await fetch(SETTINGS_API);
    if (resp.ok) factorySettings = await resp.json();
  } catch(e) {}
  applyLogo();
  // 设置默认折扣
  var d = factorySettings.discount || 1;
  document.getElementById('discountInput').value = d;
}

function applyLogo() {
  var area = document.getElementById('logoArea');
  if (factorySettings.logo) {
    area.innerHTML = '<img src="' + factorySettings.logo + '" class="topbar-logo" alt="LOGO">';
  } else {
    area.innerHTML = '<span class="topbar-logo-placeholder">📐</span>';
  }
  if (factorySettings.factoryName) {
    document.getElementById('factoryLabel').textContent = factorySettings.factoryName;
  }
}

// ===== 加载产品并注入 SceneEngine =====
async function loadProducts() {
  try {
    // 先用不带图的列表快速渲染
    var resp = await fetch(API);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var list = await resp.json();

    // 构建产品元数据
    productMeta = {};
    list.forEach(function(m) { productMeta[m.id] = { name: m.name, price: m.price || 0, category: m.category || '' }; });

    if (!list.length) {
      document.getElementById('sceneHint').textContent = '还没有产品。请先去「工厂管理」上传产品照片 →';
      document.getElementById('sceneHint').style.color = 'rgba(255,200,100,0.6)';
      return;
    }

    // 先用空图渲染产品标签，页面立刻可用
    var prods = list.map(function(m) {
      // 标签显示价格信息
      var label = m.name;
      if (m.price > 0) label += ' ¥' + formatPrice(m.price);
      return { id: m.id, name: label, image: '', w: 200, h: 200, price: m.price || 0, category: m.category || '' };
    });
    SceneEngine.cfg.products = prods;
    SceneEngine.renderProducts();

    // 在 renderProducts 之后追加分类标签
    injectCategoryLabels();

    var hint = document.getElementById('sceneHint');
    hint.textContent = '加载图片 0/' + list.length + '...';

    // 后台逐张取图
    var loaded = 0;
    list.forEach(function(m, i) {
      fetch(API + '?id=' + m.id).then(function(r){ return r.json(); }).then(function(full) {
        loaded++;
        hint.textContent = '加载图片 ' + loaded + '/' + list.length;
        if (prods[i] && full.image) { prods[i].image = full.image; SceneEngine.renderProducts(); injectCategoryLabels(); }
        if (loaded >= list.length) {
          hint.textContent = '点下方产品添加到场景 · 拖动摆放';
          hint.style.color = 'rgba(255,255,255,0.35)';
        }
      }).catch(function() {
        loaded++;
        if (loaded >= list.length) { hint.textContent = '点下方产品添加到场景 · 拖动摆放'; hint.style.color = 'rgba(255,255,255,0.35)'; }
      });
    });
  } catch(e) {
    document.getElementById('sceneHint').textContent = '⚠️ 加载失败: ' + (e.message || '网络错误');
    document.getElementById('sceneHint').style.color = '#f87171';
  }
}

// 在产品标签栏追加分类标记
function injectCategoryLabels() {
  var chipsEl = document.getElementById('productChips');
  // 移除旧的分类标签
  var oldLabels = chipsEl.querySelectorAll('.cat-separator');
  oldLabels.forEach(function(el) { el.remove(); });

  var shownCats = {};
  var chips = chipsEl.querySelectorAll('.pchip');
  chips.forEach(function(chip) {
    var onclick = chip.getAttribute('onclick') || '';
    var match = onclick.match(/SceneEngine\.add\('([^']+)'\)/);
    if (!match) return;
    var pid = match[1];
    var meta = productMeta[pid];
    if (meta && meta.category && !shownCats[meta.category]) {
      shownCats[meta.category] = true;
      var sep = document.createElement('span');
      sep.className = 'cat-separator';
      sep.style.cssText = 'font-size:9px;color:#7c3aed;display:flex;align-items:center;margin:0 2px;flex-shrink:0;';
      sep.textContent = '| ' + meta.category;
      chip.parentNode.insertBefore(sep, chip);
    }
  });
}

// ===== 拦截 SceneEngine.add，触发拖拽统计 + 更新报价 =====
var origAdd = SceneEngine.add;
SceneEngine.add = function(pid) {
  origAdd(pid);
  incrementDrag(pid);
  updatePricing();
};

// ===== 拦截删除/清空，更新报价 =====
var origDelete = SceneEngine.deleteSelected;
SceneEngine.deleteSelected = function() {
  origDelete();
  updatePricing();
};
var origClearAll = SceneEngine.clearAll;
SceneEngine.clearAll = function() {
  origClearAll();
  updatePricing();
};

// ===== 拖拽统计 =====
function incrementDrag(pid) {
  var token = localStorage.getItem('langji_token') || '';
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ action: 'incrementDrag', id: pid }),
  }).then(function(r){ return r.json(); })
    .catch(function(e){ console.error('统计失败:', e); });
}

// ===== 报价计算 =====
function updatePricing() {
  renderPricing();
}

function renderPricing() {
  var data = getScenePricingData();
  var listEl = document.getElementById('priceList');
  var summaryEl = document.getElementById('priceSummary');
  var countEl = document.getElementById('priceItemCount');

  if (data.items.length === 0) {
    listEl.innerHTML = '<div class="empty-msg">拖入产品后自动计算</div>';
    summaryEl.style.display = 'none';
    countEl.textContent = '(0)';
    return;
  }

  countEl.textContent = '(' + data.totalQty + ')';

  // 产品明细
  listEl.innerHTML = data.items.map(function(item) {
    var priceStr = item.price > 0 ? '¥' + formatPrice(item.price) : '询价';
    var qtyStr = item.qty > 1 ? ' <span class="pqty">×' + item.qty + '</span>' : '';
    var totalStr = item.price > 0 ? '¥' + formatPrice(item.price * item.qty) : '—';
    return '<div class="price-item">'
      + '<span class="pname" title="' + escHtml(item.name) + '">' + escHtml(item.name) + '</span>' + qtyStr
      + '<span class="pprice">' + escHtml(totalStr) + '</span>'
      + '</div>';
  }).join('');

  // 汇总
  var discount = parseFloat(document.getElementById('discountInput').value) || 1;
  var originalTotal = data.originalTotal;
  var finalTotal = Math.round(originalTotal * discount / 10);

  summaryEl.style.display = 'block';
  document.getElementById('priceOriginal').textContent = '¥' + formatPrice(originalTotal);
  document.getElementById('priceFinal').textContent = discount < 10 ? ('¥' + formatPrice(finalTotal) + ' (' + discount + '折)') : ('¥' + formatPrice(originalTotal));

  // 折扣不为10时显示原价行
  document.getElementById('priceOriginalRow').style.display = discount < 10 ? 'flex' : 'none';
}

function getScenePricingData() {
  var sceneArea = document.getElementById('sceneArea');
  var els = sceneArea.querySelectorAll('.product-item');
  var items = []; // [{productId, name, price, qty}]

  els.forEach(function(el) {
    var pid = el.dataset.productId;
    if (!pid) return;
    var meta = productMeta[pid];
    var name = meta ? meta.name : (el.querySelector('.product-label') ? el.querySelector('.product-label').textContent : '');
    var price = meta ? (meta.price || 0) : 0;

    var existing = null;
    for (var i = 0; i < items.length; i++) {
      if (items[i].productId === pid) { existing = items[i]; break; }
    }
    if (existing) { existing.qty++; }
    else { items.push({ productId: pid, name: name, price: price, qty: 1 }); }
  });

  var originalTotal = 0;
  var totalQty = 0;
  for (var j = 0; j < items.length; j++) {
    originalTotal += items[j].price * items[j].qty;
    totalQty += items[j].qty;
  }

  return { items: items, originalTotal: originalTotal, totalQty: totalQty };
}

function formatPrice(n) {
  return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ===== 截图增强：带 LOGO + 总价 =====
var origExport = SceneEngine.exportScreenshot;
SceneEngine.exportScreenshot = async function() {
  if (typeof html2canvas === 'undefined') { alert('截图库加载中'); return; }

  // 计算当前报价
  var pricing = getScenePricingData();
  var discount = parseFloat(document.getElementById('discountInput').value) || 1;
  var finalTotal = Math.round(pricing.originalTotal * discount / 10);

  // 注入临时浮层：LOGO + 总价
  var overlay = document.createElement('div');
  overlay.id = '__screenshot_overlay';
  overlay.style.cssText = 'position:absolute;bottom:12px;right:12px;z-index:999;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.7);border-radius:8px;padding:6px 12px;pointer-events:none;';
  var overlayHtml = '';
  if (factorySettings.logo) {
    overlayHtml += '<img src="' + factorySettings.logo + '" style="width:24px;height:24px;object-fit:contain;border-radius:3px;">';
  }
  if (pricing.items.length > 0) {
    overlayHtml += '<span style="color:#fff;font-size:13px;font-weight:600;">方案合计：¥' + formatPrice(finalTotal) + '</span>';
  }
  overlay.innerHTML = overlayHtml;
  document.getElementById('sceneArea').appendChild(overlay);

  var sceneHint = document.getElementById('sceneHint');
  sceneHint.style.display = 'none';
  document.querySelectorAll('.scale-badge').forEach(function(b) { b.style.display = 'none'; });
  if (SceneEngine._selectedId) {
    var sel = document.getElementById(SceneEngine._selectedId);
    if (sel) sel.classList.remove('selected');
  }

  var canvas = await html2canvas(document.getElementById('sceneArea'), { backgroundColor: null, useCORS: true, allowTaint: true });

  // 清理
  overlay.remove();
  sceneHint.style.display = '';
  document.querySelectorAll('.scale-badge').forEach(function(b) { b.style.display = ''; });
  if (SceneEngine._selectedId) {
    var sel = document.getElementById(SceneEngine._selectedId);
    if (sel) sel.classList.add('selected');
  }

  window.showLangjiCelebrate();

  var a = document.createElement('a');
  a.download = '朗迹-方案报价-' + new Date().toISOString().slice(0,10) + '.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
};

// ===== 初始化 =====
SceneEngine.init({
  sceneAreaId: 'sceneArea', sceneWrapperId: 'sceneWrapper', sceneHintId: 'sceneHint',
  productCountId: 'productCount', sceneChipsId: 'sceneChips', productChipsId: 'productChips',
  sceneUploadId: 'sceneUpload',
  scenes: SCENES, products: [], defaultScene: 'playground', enablePseudo3D: true
});

// 先加载设置再加载产品
loadSettings().then(function() { return loadProducts(); });
</script>
</body>
</html>
