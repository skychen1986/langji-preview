<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朗迹 · 3DGS 查看器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a14; overflow: hidden; font-family: -apple-system, sans-serif; }
canvas { display: block; }
#info {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.5); font-size: 12px; pointer-events: none;
  background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 12px;
}
#drop-hint {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: rgba(255,255,255,0.2); font-size: 18px; pointer-events: none; text-align: center;
}
#controls {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px;
}
.ctrl-btn {
  padding: 6px 14px; border-radius: 16px; border: 1px solid #333;
  background: rgba(0,0,0,0.6); color: #aaa; font-size: 11px; cursor: pointer;
  backdrop-filter: blur(4px); transition: all 0.2s;
}
.ctrl-btn:hover { border-color: #7c3aed; color: #fff; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="info">拖拽旋转 · 滚轮缩放 · 右键平移</div>
<div id="drop-hint">拖入 .ply 或 .splat 文件<br>或点击下方按钮选择文件</div>
<div id="controls">
  <button class="ctrl-btn" onclick="document.getElementById('fileInput').click()">📂 打开文件</button>
  <button class="ctrl-btn" onclick="resetCamera()">🔄 重置视角</button>
</div>
<input type="file" id="fileInput" accept=".ply,.splat,.ply.gz" style="display:none" onchange="handleFile(event)">

<script type="x-shader/x-vertex" id="vertShader">
attribute vec3 position;
attribute vec3 color;
uniform mat4 uMV;
uniform mat4 uP;
uniform float uPointSize;
varying vec3 vColor;
void main() {
  gl_Position = uP * uMV * vec4(position, 1.0);
  gl_PointSize = uPointSize;
  vColor = color;
}
</script>

<script type="x-shader/x-fragment" id="fragShader">
precision highp float;
varying vec3 vColor;
void main() {
  float d = length(gl_PointCoord - 0.5) * 2.0;
  if (d > 1.0) discard;
  float alpha = 1.0 - smoothstep(0.0, 1.0, d);
  alpha *= 0.8;
  gl_FragColor = vec4(vColor, alpha);
}
</script>

<script>
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: true }) ||
           canvas.getContext('experimental-webgl');

if (!gl) {
  document.getElementById('drop-hint').textContent = '❌ 浏览器不支持 WebGL';
}

let vertices = [];
let pointCount = 0;
let pointSize = 3.0;
let program, uMV, uP, uPointSize;

// Arcball camera
let camera = {
  theta: 0, phi: 0.5, dist: 5,
  targetX: 0, targetY: 0, targetZ: 0,
};
let dragStart = null;
let dragButton = -1;

// ===== Shader setup =====
function compileShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(shader));
  }
  return shader;
}

function initShaders() {
  const vs = compileShader(gl.VERTEX_SHADER, document.getElementById('vertShader').textContent);
  const fs = compileShader(gl.FRAGMENT_SHADER, document.getElementById('fragShader').textContent);
  program = gl.createProgram();
  gl.attachShader(program, vs);
  gl.attachShader(program, fs);
  gl.linkProgram(program);
  gl.useProgram(program);
  uMV = gl.getUniformLocation(program, 'uMV');
  uP = gl.getUniformLocation(program, 'uP');
  uPointSize = gl.getUniformLocation(program, 'uPointSize');
}

// ===== File parsers =====
async function parsePLY(text) {
  const lines = text.split('\n');
  let vertexCount = 0;
  let headerEnd = 0;
  let hasColor = false;
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i].trim();
    if (l.startsWith('element vertex ')) vertexCount = parseInt(l.split(' ')[2]);
    if (l.startsWith('property uchar red') || l.startsWith('property float red')) hasColor = true;
    if (l === 'end_header') { headerEnd = i + 1; break; }
  }
  const data = new Float32Array(vertexCount * 6);
  for (let i = 0; i < vertexCount; i++) {
    const parts = lines[headerEnd + i].trim().split(/\s+/);
    const off = i * 6;
    data[off] = parseFloat(parts[0]);     // x
    data[off + 1] = parseFloat(parts[1]); // y
    data[off + 2] = parseFloat(parts[2]); // z
    if (hasColor && parts.length >= 6) {
      data[off + 3] = parseFloat(parts[3]) / 255.0; // r
      data[off + 4] = parseFloat(parts[4]) / 255.0; // g
      data[off + 5] = parseFloat(parts[5]) / 255.0; // b
    } else {
      data[off + 3] = 0.7; data[off + 4] = 0.7; data[off + 5] = 0.7;
    }
  }
  return data;
}

function parseSplat(buffer) {
  // .splat format: 32 bytes per gaussian
  // float32 x, y, z (position)
  // uint8[4] packed scales
  // uint8[4] packed color + alpha
  // uint8[4] packed quaternion rotation
  const count = buffer.byteLength / 32;
  const data = new Float32Array(count * 6);
  const view = new DataView(buffer);
  for (let i = 0; i < count; i++) {
    const off = i * 6;
    data[off] = view.getFloat32(i * 32, true);       // x
    data[off + 1] = view.getFloat32(i * 32 + 4, true); // y
    data[off + 2] = view.getFloat32(i * 32 + 8, true); // z
    // packed color at bytes 16-19
    const c = view.getUint32(i * 32 + 16, true);
    data[off + 3] = ((c >> 0) & 0xFF) / 255.0;
    data[off + 4] = ((c >> 8) & 0xFF) / 255.0;
    data[off + 5] = ((c >> 16) & 0xFF) / 255.0;
  }
  return data;
}

function uploadGPU(data) {
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);

  const posLoc = gl.getAttribLocation(program, 'position');
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 24, 0);

  const colLoc = gl.getAttribLocation(program, 'color');
  gl.enableVertexAttribArray(colLoc);
  gl.vertexAttribPointer(colLoc, 3, gl.FLOAT, false, 24, 12);

  pointCount = data.length / 6;
  document.getElementById('drop-hint').style.display = 'none';
  document.getElementById('info').textContent =
    `点云数量: ${pointCount.toLocaleString()} · 拖拽旋转 · 滚轮缩放 · 右键平移`;
  resetCamera();
}

async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const name = file.name.toLowerCase();
  const buf = await file.arrayBuffer();

  let data;
  if (name.endsWith('.splat')) {
    data = parseSplat(buf);
  } else if (name.endsWith('.ply')) {
    const text = new TextDecoder().decode(buf);
    data = await parsePLY(text);
  } else {
    alert('不支持的文件格式，请使用 .ply 或 .splat');
    return;
  }
  uploadGPU(data);
}

function resetCamera() {
  camera.theta = 0; camera.phi = 0.5; camera.dist = 5;
  camera.targetX = 0; camera.targetY = 0; camera.targetZ = 0;
}

// ===== Drag-drop =====
document.addEventListener('dragover', e => { e.preventDefault(); });
document.addEventListener('drop', async e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const name = file.name.toLowerCase();
  const buf = await file.arrayBuffer();
  let data;
  if (name.endsWith('.splat')) data = parseSplat(buf);
  else if (name.endsWith('.ply')) {
    const text = new TextDecoder().decode(buf);
    data = await parsePLY(text);
  } else return;
  uploadGPU(data);
});

// ===== Mouse/Touch =====
canvas.addEventListener('mousedown', e => { dragStart = { x: e.clientX, y: e.clientY, button: e.button }; dragButton = e.button; });
canvas.addEventListener('mousemove', e => {
  if (!dragStart) return;
  const dx = e.clientX - dragStart.x;
  const dy = e.clientY - dragStart.y;
  if (dragButton === 0) { // left = rotate
    camera.theta -= dx * 0.005;
    camera.phi = Math.max(-1.5, Math.min(1.5, camera.phi - dy * 0.005));
  } else if (dragButton === 2) { // right = pan
    camera.targetX -= dx * 0.01;
    camera.targetY += dy * 0.01;
  }
  dragStart = { x: e.clientX, y: e.clientY, button: dragButton };
});
canvas.addEventListener('mouseup', () => { dragStart = null; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camera.dist = Math.max(0.5, Math.min(30, camera.dist * (e.deltaY > 0 ? 1.1 : 0.9)));
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Touch
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, button: 0 };
  } else if (e.touches.length === 2) {
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY,
                  x2: e.touches[1].clientX, y2: e.touches[1].clientY,
                  dist: Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                                   e.touches[0].clientY - e.touches[1].clientY) };
  }
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!dragStart) return;
  if (dragStart.x2 !== undefined && e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                            e.touches[0].clientY - e.touches[1].clientY);
    camera.dist = Math.max(0.5, Math.min(30, camera.dist * (dragStart.dist / dist)));
    dragStart.dist = dist;
  } else if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - dragStart.x;
    const dy = e.touches[0].clientY - dragStart.y;
    camera.theta -= dx * 0.005;
    camera.phi = Math.max(-1.5, Math.min(1.5, camera.phi - dy * 0.005));
    dragStart.x = e.touches[0].clientX;
    dragStart.y = e.touches[0].clientY;
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { dragStart = null; });

// Point size with +/- keys
document.addEventListener('keydown', e => {
  if (e.key === '+') pointSize = Math.min(10, pointSize + 0.5);
  if (e.key === '-') pointSize = Math.max(0.5, pointSize - 0.5);
});

// ===== Render loop =====
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);

function render() {
  requestAnimationFrame(render);
  if (pointCount === 0) return;

  resize();
  gl.clearColor(0.04, 0.04, 0.08, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.useProgram(program);

  const aspect = canvas.width / canvas.height;
  const proj = new Float32Array(16);
  // Simple perspective
  const fov = 0.8;
  const near = 0.1, far = 100;
  const f = 1.0 / Math.tan(fov / 2);
  proj[0] = f / aspect; proj[5] = f; proj[10] = (far + near) / (near - far);
  proj[11] = -1; proj[14] = (2 * far * near) / (near - far);
  gl.uniformMatrix4fv(uP, false, proj);

  // Camera
  const eyeX = camera.targetX + camera.dist * Math.cos(camera.phi) * Math.sin(camera.theta);
  const eyeY = camera.targetY + camera.dist * Math.sin(camera.phi);
  const eyeZ = camera.targetZ + camera.dist * Math.cos(camera.phi) * Math.cos(camera.theta);

  const mv = mat4LookAt([eyeX, eyeY, eyeZ], [camera.targetX, camera.targetY, camera.targetZ], [0, 1, 0]);
  gl.uniformMatrix4fv(uMV, false, mv);
  gl.uniform1f(uPointSize, pointSize);

  gl.drawArrays(gl.POINTS, 0, pointCount);
}

function mat4LookAt(eye, center, up) {
  const z = normalize([eye[0] - center[0], eye[1] - center[1], eye[2] - center[2]]);
  const x = normalize(cross(up, z));
  const y = cross(z, x);
  return new Float32Array([
    x[0], y[0], z[0], 0,
    x[1], y[1], z[1], 0,
    x[2], y[2], z[2], 0,
    -dot(x, eye), -dot(y, eye), -dot(z, eye), 1,
  ]);
}
function normalize(v) { const l = Math.hypot(v[0], v[1], v[2]); return l > 0 ? [v[0]/l, v[1]/l, v[2]/l] : [0,0,1]; }
function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function dot(a, b) { return a[0]*b[0] + a[1]*b[1] + a[2]*b[2]; }

// ===== Start =====
initShaders();
resize();
render();

// URL param: ?file=products/xxx.splat
const urlParams = new URLSearchParams(window.location.search);
const fileParam = urlParams.get('file');
if (fileParam) {
  fetch(fileParam).then(r => r.arrayBuffer()).then(buf => {
    const name = fileParam.toLowerCase();
    let data;
    if (name.endsWith('.splat')) data = parseSplat(buf);
    else if (name.endsWith('.ply')) {
      const text = new TextDecoder().decode(buf);
      parsePLY(text).then(d => uploadGPU(d));
      return;
    }
    if (data) uploadGPU(data);
  }).catch(() => {
    document.getElementById('drop-hint').textContent = '文件加载失败，请拖入 .ply 或 .splat 文件';
  });
}
</script>
</body>
</html>
